server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Agnes 生成结果不带 CORS 头，经同源路径反代给前端拉取落库。
    location /agnes-outputs/ {
        proxy_pass https://platform-outputs.agnes-ai.space/;
        proxy_ssl_server_name on;
    }
}
